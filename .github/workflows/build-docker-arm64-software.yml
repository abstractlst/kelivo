name: Build Docker ARM64 Software

env:
  FLUTTER_VERSION: '3.38.4'

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: '发布到 Release'
        required: false
        default: false
        type: boolean

      release_tag:
        description: 'Release 标签（如 v1.0.0）'
        required: false
        default: ''
        type: string

      prerelease:
        description: '是否为预发布版本 (Pre-release)'
        required: false
        default: false
        type: boolean

jobs:
  docker-arm64-software:
    name: 构建 Docker ARM64（软件渲染）
    runs-on: ubuntu-22.04-arm
    permissions: write-all

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 获取版本号
        shell: bash
        run: |
          set -euxo pipefail
          RAW_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION=$RAW_VERSION
          if [ "${{ github.event.inputs.publish_release }}" != "true" ]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${VERSION}_${SHORT_SHA}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NUMBER=$(echo "$RAW_VERSION" | cut -d'+' -f1)" >> "$GITHUB_ENV"

      - name: 🐳 构建 Docker 镜像
        shell: bash
        run: |
          set -euxo pipefail
          DOCKER_TAG=$(echo "${VERSION}" | tr '+' '-' | tr '/' '-')
          IMAGE="kelivo-arm64-software:${DOCKER_TAG}"
          docker build \
            --build-arg FLUTTER_VERSION="${FLUTTER_VERSION}" \
            --build-arg SILICONFLOW_FALLBACK_KEY="${{ secrets.SILICONFLOW_KEY }}" \
            -f docker/Dockerfile.arm64.software \
            -t "${IMAGE}" \
            .
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: 🧪 容器启动冒烟测试（Xvfb）
        shell: bash
        run: |
          set -euxo pipefail
          code=0
          timeout --kill-after=10s 35s docker run --name kelivo-smoke --rm -e USE_XVFB=1 "${IMAGE}" || code=$?
          docker rm -f kelivo-smoke >/dev/null 2>&1 || true
          echo "smoke test exit code: ${code}"
          if [ "${code:-0}" -ne 0 ] && [ "${code:-0}" -ne 124 ] && [ "${code:-0}" -ne 137 ] && [ "${code:-0}" -ne 143 ]; then
            exit "${code}"
          fi

      - name: 📦 导出离线镜像包
        shell: bash
        run: |
          set -euxo pipefail
          TAR_NAME="Kelivo_docker_arm64_software_${VERSION}.tar.gz"
          docker save "${IMAGE}" | gzip -c > "${TAR_NAME}"
          cat > "Kelivo_docker_arm64_software_${VERSION}_run.sh" << 'EOF'
          #!/bin/bash
          set -euo pipefail

          CONTAINER_NAME="${KELIVO_CONTAINER_NAME:-kelivo-arm64-software}"
          IMAGE_REPO="kelivo-arm64-software"

          find_image() {
            docker images --format '{{.Repository}}:{{.Tag}}' | grep "^${IMAGE_REPO}:" | head -n 1 || true
          }

          create_container_if_needed() {
            local image_tar="${1:-}"
            local image=""

            if docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
              return
            fi

            image="$(find_image)"
            if [ -z "${image}" ]; then
              if [ -z "${image_tar}" ]; then
                echo "首次运行请传入镜像包:"
                echo "  $0 Kelivo_docker_arm64_software_*.tar.gz"
                exit 1
              fi
              if [ ! -f "${image_tar}" ]; then
                echo "镜像包不存在: ${image_tar}"
                exit 1
              fi
              echo "导入镜像: ${image_tar}"
              gzip -dc "${image_tar}" | docker load
              image="$(find_image)"
            fi

            if [ -z "${image}" ]; then
              echo "未找到 ${IMAGE_REPO} 镜像，导入失败。"
              exit 1
            fi

            xhost +local:root >/dev/null 2>&1 || true
            docker create \
              --name "${CONTAINER_NAME}" \
              -e DISPLAY="${DISPLAY:-:0}" \
              -e LIBGL_ALWAYS_SOFTWARE=1 \
              -e GALLIUM_DRIVER=llvmpipe \
              -e MESA_LOADER_DRIVER_OVERRIDE=llvmpipe \
              -v /tmp/.X11-unix:/tmp/.X11-unix \
              "${image}" >/dev/null

            echo "容器已创建: ${CONTAINER_NAME}"
            echo "以后可直接运行: docker start ${CONTAINER_NAME}"
          }

          main() {
            local image_tar="${1:-}"

            create_container_if_needed "${image_tar}"

            if docker ps --format '{{.Names}}' | grep -qx "${CONTAINER_NAME}"; then
              echo "容器已在运行: ${CONTAINER_NAME}"
              exit 0
            fi

            xhost +local:root >/dev/null 2>&1 || true
            docker start "${CONTAINER_NAME}" >/dev/null
            echo "已启动 ${CONTAINER_NAME}"
            echo "关闭 Kelivo 窗口后，容器会自动停止。"
          }

          main "${1:-}"
          EOF
          chmod +x "Kelivo_docker_arm64_software_${VERSION}_run.sh"

      - name: 🚀 发布到 Release
        if: ${{ github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            Kelivo_docker_arm64_software_*.tar.gz
            Kelivo_docker_arm64_software_*_run.sh

      - name: 📤 上传构建产物（Docker）
        uses: actions/upload-artifact@v4
        with:
          name: Docker-ARM64-Software
          path: |
            Kelivo_docker_arm64_software_*.tar.gz
            Kelivo_docker_arm64_software_*_run.sh
