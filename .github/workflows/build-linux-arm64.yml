name: Build Linux ARM64

env:
  FLUTTER_VERSION: '3.38.4'

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: '发布到 Release'
        required: false
        default: false
        type: boolean

      release_tag:
        description: 'Release 标签（如 v1.0.0）'
        required: false
        default: ''
        type: string

      prerelease:
        description: '是否为预发布版本 (Pre-release)'
        required: false
        default: false
        type: boolean

jobs:
  linux-arm64:
    name: 构建 Linux ARM64
    # 使用 GitHub 提供的 ARM64 runner（仅公开仓库可用）
    runs-on: ubuntu-22.04-arm
    permissions: write-all

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            rpm patchelf libfuse2 file \
            libkeybinder-3.0-dev libayatana-appindicator3-dev \
            libunwind-dev libglib2.0-bin libgdk-pixbuf2.0-bin

      - name: 🐦 安装 Flutter
        shell: bash
        run: |
          set -euxo pipefail

          FLUTTER_DIR="$HOME/flutter"
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$FLUTTER_DIR"

          # Prefer the configured tag if it exists; otherwise keep stable HEAD.
          if [ -n "${FLUTTER_VERSION:-}" ] && git -C "$FLUTTER_DIR" ls-remote --tags --refs origin "refs/tags/${FLUTTER_VERSION}" | grep -q .; then
            git -C "$FLUTTER_DIR" fetch --depth 1 origin "refs/tags/${FLUTTER_VERSION}:refs/tags/${FLUTTER_VERSION}"
            git -C "$FLUTTER_DIR" checkout "${FLUTTER_VERSION}"
          fi

          echo "$FLUTTER_DIR/bin" >> "$GITHUB_PATH"
          echo "$FLUTTER_DIR/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"

          "$FLUTTER_DIR/bin/flutter" --disable-analytics
          "$FLUTTER_DIR/bin/flutter" config --enable-linux-desktop
          "$FLUTTER_DIR/bin/flutter" precache --linux
          "$FLUTTER_DIR/bin/flutter" --version

      - name: 📝 Inject fallback
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: 📝 获取版本号
        run: |
          RAW_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION=$RAW_VERSION
          if [ "${{ github.event.inputs.publish_release }}" != "true" ]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${VERSION}_${SHORT_SHA}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$(echo $RAW_VERSION | cut -d'+' -f1)" >> $GITHUB_ENV
          echo "版本号: $VERSION"

      - name: 🏗️ 构建 Linux ARM64
        run: flutter build linux --release

      - name: 📦 打包 tar.gz
        run: |
          cd build/linux/arm64/release/bundle
          tar -czf ../../../../../Kelivo_linux_${VERSION}_arm64.tar.gz .

      - name: 📦 创建 AppImage
        shell: bash
        run: |
          set -euxo pipefail

          list_elf_files() {
            local root="$1"
            find "$root" -type f -print0 | xargs -0r file | awk -F: '/ELF/ {print $1}'
          }

          should_skip_dep() {
            local dep="$1"
            case "$dep" in
              */ld-linux-aarch64.so.1|*/libc.so.*|*/libpthread.so.*|*/libdl.so.*|*/librt.so.*|*/libm.so.*|*/libresolv.so.*|*/libnss_*.so.*|*/libutil.so.*|*/libanl.so.*|*/libBrokenLocale.so.*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          copy_one_dep() {
            local dep="$1"
            local real_dep soname real_name dest_real dest_soname
            real_dep="$(readlink -f "$dep" || true)"
            [ -n "$real_dep" ] || return 0
            [ -f "$real_dep" ] || return 0
            should_skip_dep "$real_dep" && return 0

            soname="$(basename "$dep")"
            real_name="$(basename "$real_dep")"
            dest_real="AppDir/usr/lib/${real_name}"
            dest_soname="AppDir/usr/lib/${soname}"

            if [ ! -f "$dest_real" ]; then
              cp -L "$real_dep" "$dest_real"
              chmod 755 "$dest_real" || true
              echo "$dest_real"
            fi

            if [ "$soname" != "$real_name" ] && [ ! -e "$dest_soname" ]; then
              ln -s "$real_name" "$dest_soname"
            fi
          }

          bundle_closure_deps() {
            local start_root="$1"
            local -a queue=()
            local current dep copied
            declare -A scanned=()

            while IFS= read -r f; do
              queue+=("$f")
            done < <(list_elf_files "$start_root")

            while [ "${#queue[@]}" -gt 0 ]; do
              current="${queue[0]}"
              queue=("${queue[@]:1}")
              if [ -n "${scanned[$current]:-}" ]; then
                continue
              fi
              scanned["$current"]=1

              while IFS= read -r dep; do
                [ -n "$dep" ] || continue
                copied="$(copy_one_dep "$dep" || true)"
                if [ -n "$copied" ]; then
                  queue+=("$copied")
                fi
              done < <(ldd "$current" 2>/dev/null | awk '/=>/ {print $3} /^[[:space:]]*\/[^[:space:]]+/ {print $1}' | grep '^/' || true)
            done
          }

          # 下载 ARM64 版本的 appimagetool
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage"
          chmod +x appimagetool

          # 创建 AppDir 结构
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/arm64/release/bundle/* AppDir/usr/bin/

          # 复制常见 GTK/GIO 运行时资源，提升“基础系统”兼容性
          if [ -d /usr/lib/aarch64-linux-gnu/gio/modules ]; then
            mkdir -p AppDir/usr/lib/gio
            cp -a /usr/lib/aarch64-linux-gnu/gio/modules AppDir/usr/lib/gio/
          fi
          if [ -d /usr/lib/aarch64-linux-gnu/gtk-3.0 ]; then
            cp -a /usr/lib/aarch64-linux-gnu/gtk-3.0 AppDir/usr/lib/
          fi
          if [ -d /usr/lib/aarch64-linux-gnu/gdk-pixbuf-2.0 ]; then
            cp -a /usr/lib/aarch64-linux-gnu/gdk-pixbuf-2.0 AppDir/usr/lib/
          fi
          if [ -d /usr/share/glib-2.0/schemas ]; then
            mkdir -p AppDir/usr/share/glib-2.0
            cp -a /usr/share/glib-2.0/schemas AppDir/usr/share/glib-2.0/
            glib-compile-schemas AppDir/usr/share/glib-2.0/schemas || true
          fi

          # 收集依赖闭包（尽量把运行库打进 AppImage）
          bundle_closure_deps AppDir/usr/bin
          if [ -d AppDir/usr/lib/gtk-3.0 ] || [ -d AppDir/usr/lib/gio ] || [ -d AppDir/usr/lib/gdk-pixbuf-2.0 ]; then
            bundle_closure_deps AppDir/usr/lib
          fi

          # 让主程序优先加载 AppImage 内库
          patchelf --set-rpath '$ORIGIN:$ORIGIN/../lib' AppDir/usr/bin/kelivo || true

          # 依赖完整性检查（仅检查明显 not found）
          MISSING=0
          while IFS= read -r elf; do
            if LD_LIBRARY_PATH="$PWD/AppDir/usr/lib:$PWD/AppDir/usr/bin" ldd "$elf" 2>/dev/null | grep -q 'not found'; then
              echo "❌ Missing deps in: $elf"
              LD_LIBRARY_PATH="$PWD/AppDir/usr/lib:$PWD/AppDir/usr/bin" ldd "$elf" 2>/dev/null || true
              MISSING=1
            fi
          done < <(list_elf_files AppDir/usr/bin)
          if [ "$MISSING" -ne 0 ]; then
            echo "❌ AppDir 仍有未解析依赖"
            exit 1
          fi

          # 创建 AppRun 脚本
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export APPDIR="${HERE}"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          export GSETTINGS_SCHEMA_DIR="${HERE}/usr/share/glib-2.0/schemas"
          export GIO_MODULE_DIR="${HERE}/usr/lib/gio/modules"
          export XDG_DATA_DIRS="${HERE}/usr/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
          export GTK_EXE_PREFIX="${HERE}/usr"
          export GTK_DATA_PREFIX="${HERE}/usr"
          exec "${HERE}/usr/bin/kelivo" "$@"
          EOF
          chmod +x AppDir/AppRun

          # 创建 desktop 文件
          cat > AppDir/kelivo.desktop << EOF
          [Desktop Entry]
          Name=Kelivo
          Exec=kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          EOF

          ICON_SOURCE="linux/kelivo.png"
          if [ ! -f "$ICON_SOURCE" ]; then
            ICON_SOURCE="assets/app_icon.png"
          fi
          if [ ! -f "$ICON_SOURCE" ]; then
            echo "❌ Icon source not found"
            exit 1
          fi
          install -Dm644 "$ICON_SOURCE" AppDir/kelivo.png
          install -Dm644 "$ICON_SOURCE" "AppDir/usr/share/icons/hicolor/256x256/apps/kelivo.png"

          # 调试：输出 AppDir 内 ELF 文件架构
          echo "== ELF files in AppDir =="
          find AppDir -type f -print0 | xargs -0r file | grep -E 'ELF|executable|shared object' || true

          # 构建 AppImage
          ARCH=arm_aarch64 ./appimagetool AppDir Kelivo_linux_${VERSION}_arm64.AppImage

          # 离线兜底：无 FUSE 启动脚本 + 可直接解压运行包
          cat > Kelivo_linux_${VERSION}_arm64_run.sh << EOF
          #!/bin/bash
          set -e
          SELF_DIR=\$(cd "\$(dirname "\$0")" && pwd)
          APP="\${SELF_DIR}/Kelivo_linux_${VERSION}_arm64.AppImage"
          chmod +x "\${APP}" || true
          exec "\${APP}" --appimage-extract-and-run "\$@"
          EOF
          chmod +x Kelivo_linux_${VERSION}_arm64_run.sh

          rm -rf squashfs-root
          ./Kelivo_linux_${VERSION}_arm64.AppImage --appimage-extract >/dev/null
          tar -C squashfs-root -czf Kelivo_linux_${VERSION}_arm64_nofuse.tar.gz .
          rm -rf squashfs-root

      - name: 📦 创建 DEB 包
        run: |
          # 创建 DEB 目录结构
          mkdir -p deb/DEBIAN
          mkdir -p deb/opt/kelivo
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps

          # 复制文件
          cp -r build/linux/arm64/release/bundle/* deb/opt/kelivo/

          # 创建 control 文件
          cat > deb/DEBIAN/control << EOF
          Package: kelivo
          Version: ${VERSION_NUMBER}
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: Psyche <your@email.com>
          Depends: libgtk-3-0, libstdc++6, libglu1-mesa, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libglib2.0-0, libc6
          Description: Kelivo Application
           A Flutter application for Linux
          EOF

          # 创建 desktop 文件
          cat > deb/usr/share/applications/kelivo.desktop << EOF
          [Desktop Entry]
          Name=Kelivo
          Exec=/opt/kelivo/kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          EOF

          ICON_SOURCE="linux/kelivo.png"
          if [ ! -f "$ICON_SOURCE" ]; then
            ICON_SOURCE="assets/app_icon.png"
          fi
          if [ ! -f "$ICON_SOURCE" ]; then
            echo "❌ Icon source not found"
            exit 1
          fi
          install -Dm644 "$ICON_SOURCE" deb/usr/share/icons/hicolor/256x256/apps/kelivo.png

          # 创建启动脚本
          cat > deb/opt/kelivo/kelivo.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./kelivo "$@"
          EOF
          chmod +x deb/opt/kelivo/kelivo.sh

          # 构建 DEB 包
          dpkg-deb --build deb Kelivo_linux_${VERSION}_arm64.deb

      - name: 📦 创建 RPM 包
        run: |
          # 创建 RPM 构建目录
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # 创建源码目录
          mkdir -p kelivo-${VERSION_NUMBER}
          cp -r build/linux/arm64/release/bundle/* kelivo-${VERSION_NUMBER}/
          ICON_SOURCE="linux/kelivo.png"
          if [ ! -f "$ICON_SOURCE" ]; then
            ICON_SOURCE="assets/app_icon.png"
          fi
          if [ ! -f "$ICON_SOURCE" ]; then
            echo "❌ Icon source not found"
            exit 1
          fi
          cp "$ICON_SOURCE" kelivo-${VERSION_NUMBER}/kelivo.png
          tar -czf ~/rpmbuild/SOURCES/kelivo-${VERSION_NUMBER}.tar.gz kelivo-${VERSION_NUMBER}

          # 创建 spec 文件
          cat > ~/rpmbuild/SPECS/kelivo.spec << EOF
          Name:           kelivo
          Version:        ${VERSION_NUMBER}
          Release:        1%{?dist}
          Summary:        Kelivo Application
          License:        MIT
          Source0:        %{name}-%{version}.tar.gz
          BuildArch:      aarch64
          Requires:       gtk3, libstdc++ >= 6, mesa-libGLU, gstreamer1, gstreamer1-plugins-base, glib2, glibc

          %description
          A Flutter application for Linux

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}/opt/kelivo
          cp -r * %{buildroot}/opt/kelivo/

          mkdir -p %{buildroot}/usr/share/applications
          cat > %{buildroot}/usr/share/applications/kelivo.desktop << 'DESKTOPEOF'
          [Desktop Entry]
          Name=Kelivo
          Exec=/opt/kelivo/kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          DESKTOPEOF

          mkdir -p %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cp kelivo.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/kelivo.png

          %files
          /opt/kelivo/*
          /usr/share/applications/kelivo.desktop
          /usr/share/icons/hicolor/256x256/apps/kelivo.png

          %changelog
          * $(date "+%a %b %d %Y") Psyche <your@email.com> - ${VERSION_NUMBER}-1
          - Initial RPM release
          EOF

          # 构建 RPM
          rpmbuild -bb ~/rpmbuild/SPECS/kelivo.spec
          cp ~/rpmbuild/RPMS/aarch64/kelivo-${VERSION_NUMBER}-1.*.rpm Kelivo_linux_${VERSION}_arm64.rpm
      - name: 🔍 RPM 元数据（调试）
        shell: bash
        run: |
          set -euxo pipefail
          RPM_FILE="Kelivo_linux_${VERSION}_arm64.rpm"
          echo "RPM file: ${RPM_FILE}"
          cp -f ~/rpmbuild/SPECS/kelivo.spec rpm-spec.spec
          rpm -qp --info "${RPM_FILE}" | tee rpm-info.txt
          rpm -qp --requires "${RPM_FILE}" | tee rpm-requires.txt
          rpm -qp --provides "${RPM_FILE}" | tee rpm-provides.txt
      - name: 📤 上传 RPM 元数据（调试）
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64-RPM-Metadata
          path: |
            rpm-spec.spec
            rpm-info.txt
            rpm-requires.txt
            rpm-provides.txt
      - name: 🧪 Fedora 43 安装测试
        shell: bash
        run: |
          set -euxo pipefail
          RPM_FILE="Kelivo_linux_${VERSION}_arm64.rpm"
          docker run --rm -v "${PWD}:/work" -w /work fedora:43 bash -lc "dnf -y install ./${RPM_FILE}"

      - name: 🚀 发布到 Release
        if: ${{ github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            Kelivo_linux_*_arm64.tar.gz
            Kelivo_linux_*_arm64_nofuse.tar.gz
            Kelivo_linux_*_arm64_run.sh
            Kelivo_linux_*_arm64.AppImage
            Kelivo_linux_*_arm64.deb
            Kelivo_linux_*_arm64.rpm

      - name: 📤 上传构建产物 (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64-tar.gz
          path: Kelivo_linux_*_arm64.tar.gz

      - name: 📤 上传构建产物 (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64-AppImage
          path: |
            Kelivo_linux_*_arm64.AppImage
            Kelivo_linux_*_arm64_nofuse.tar.gz
            Kelivo_linux_*_arm64_run.sh

      - name: 📤 上传构建产物 (DEB)
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64-DEB
          path: Kelivo_linux_*_arm64.deb

      - name: 📤 上传构建产物 (RPM)
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64-RPM
          path: Kelivo_linux_*_arm64.rpm
